name: Codebase Health Check
on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      - name: Set Node Version to 24.11.0
        uses: actions/setup-node@v4
        with:
          node-version: '24.11.0'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install Dependencies
        run: npm ci
      # - name: Run ESLint
      #   run: npm run lint
      - name: Run Typecheck
        run: npm run typecheck